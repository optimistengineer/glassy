name: Track Extension Installs

on:
  schedule:
    - cron: '0 0 * * *' # Daily at 12 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch install counts
        run: node scripts/fetch-installs.js

      - name: Generate chart
        run: node scripts/generate-chart.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/installs.json assets/installs-chart.svg
          git diff --cached --quiet || git commit -m "chore: update install stats [skip ci]"
          git push

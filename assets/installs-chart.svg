    .dot-vscode  { stroke: #8da4ff; }
    .dot-openvsx { stroke: #5eead4; }
    .end-label       { fill: #e2e2e8; }
    .end-value       { fill: #8b949e; }
    .area-total-top    { stop-color: #ff9b85; }
    .area-total-bottom { stop-color: #ff9b85; }
  }
</style>
